<svg fill="none" viewBox="0 0 800 165" width="800" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="800" height="165">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .t {
          background: #0d1117;
          padding: 26px 0 26px 12px;
          font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
          font-size: 14px;
          line-height: 2;
          width: 800px;
          height: 165px;
          white-space: nowrap;
        }
        .g   { color: #00ff41; }
        .c   { color: #00cc33; }
        .m   { color: #39d353; }
        .line { opacity: 0; }
        .type { display: inline-block; overflow: hidden; white-space: nowrap; width: 0; vertical-align: bottom; }

        /* whoami = 6 chars */
        .l1 { animation: show 0s 0.3s forwards; }
        .t1 { animation: type1 0.5s steps(6, end) 0.5s forwards; }
        @keyframes type1 { to { width: 6ch; } }

        /* a tinkerer = 12 chars (2 spaces + 10) */
        .l2 { animation: show 0s 1.1s forwards; }
        .t2 { animation: type2 1.0s steps(12, end) 1.1s forwards; }
        @keyframes type2 { to { width: 12ch; } }

        /* cat about.txt = 13 chars */
        .l3 { animation: show 0s 2.3s forwards; }
        .t3 { animation: type3 0.9s steps(13, end) 2.5s forwards; }
        @keyframes type3 { to { width: 13ch; } }

        /* mostly ai. sometimes infra. always curious. = 45 chars */
        .l4 { animation: show 0s 3.6s forwards; }
        .t4 { animation: type4 3.0s steps(45, end) 3.6s forwards; }
        @keyframes type4 { to { width: 45ch; } }

        .cur { opacity: 0; animation: blink 1s 6.8s infinite; }
        @keyframes show  { to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      </style>
      <div class="t">
        <div class="line l1"><span class="g">❯ </span><span class="type t1 c">whoami</span></div>
        <div class="line l2"><span class="type t2 m">  a tinkerer</span></div>
        <div class="line l3"><span class="g">❯ </span><span class="type t3 c">cat about.txt</span></div>
        <div class="line l4"><span class="type t4 m">  mostly ai. sometimes infra. always curious.</span><span class="cur g">▊</span></div>
      </div>
    </div>
  </foreignObject>
</svg>
